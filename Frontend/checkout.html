<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — ALL IN ONE ABROAD</title>
  <link rel="stylesheet" href="style.css?v=12"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; max-width: 1100px; margin: 40px auto; padding: 0 32px; }
    .form-section { background: #fff; border: 1.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
    .form-section h3 { font-size: 16px; font-weight: 800; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 6px; color: var(--dark); }
    .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--orange); }
    .order-card { background: #fff; border: 1.5px solid var(--border); border-radius: 16px; padding: 24px; position: sticky; top: 80px; height: fit-content; }
    .order-card h3 { font-size: 16px; font-weight: 800; margin-bottom: 18px; }
    .order-item { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 10px; }
    .order-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 800; padding-top: 14px; border-top: 1px solid var(--border); margin-top: 10px; }
    .pay-methods { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .pay-opt { border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; transition: border-color 0.15s, background 0.15s; }
    .pay-opt:hover { border-color: var(--orange); background: #fff7ed; }
    .pay-opt input { accent-color: var(--orange); }
    @media(max-width:768px){.checkout-layout{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="announce-bar"><div class="announce-track"><span>🔒 Secure Checkout — SSL Encrypted</span><span>💳 eSewa • Khalti • FonePay • COD</span><span>🔒 Secure Checkout — SSL Encrypted</span><span>💳 eSewa • Khalti • FonePay • COD</span></div></div>
<header class="site-header"><div class="header-inner"><a href="index.html" class="logo"><img src="allinonelogo.png?v=1" alt="ALL IN ONE ABROAD" class="logo-img"/></a><div style="margin-left:auto;font-size:13px;color:var(--gray);display:flex;align-items:center;gap:8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Secure Checkout</div></div></header>

<div class="checkout-layout">
  <div>
    <div class="form-section">
      <h3>📦 Shipping Address</h3>
      <div id="checkoutError" style="display:none;background:#fef2f2;color:#dc2626;font-size:13px;font-weight:600;padding:10px 14px;border-radius:8px;margin-bottom:16px;"></div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" id="ckFirstName" required placeholder="Rahul"/></div>
        <div class="form-group"><label>Last Name</label><input type="text" id="ckLastName" required placeholder="Sharma"/></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="ckEmail" required placeholder="rahul@email.com"/></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="ckPhone" required pattern="[0-9+\-\s()]{7,20}" placeholder="+91 98XXX XXXXX"/></div>
      <div class="form-group"><label>Address Line 1</label><input type="text" id="ckAddr1" required placeholder="Street, Colony"/></div>
      <div class="form-group"><label>Address Line 2 (optional)</label><input type="text" id="ckAddr2" placeholder="Apartment, Floor"/></div>
      <div class="form-row">
        <div class="form-group"><label>City</label><input type="text" id="ckCity" required placeholder="Delhi / Kathmandu"/></div>
        <div class="form-group"><label>Postal / PIN Code</label><input type="text" id="ckPincode" required placeholder="110001 / 44600"/></div>
      </div>
      <div class="form-group"><label>State / Province</label><input type="text" id="ckState" required placeholder="e.g. Delhi or Bagmati Province"/></div>
    </div>
    <div class="form-section">
      <h3>💳 Payment Method</h3>
      <div class="pay-methods">
        <label class="pay-opt"><input type="radio" name="pay" checked> eSewa</label>
        <label class="pay-opt"><input type="radio" name="pay"> Khalti</label>
        <label class="pay-opt"><input type="radio" name="pay"> FonePay</label>
        <label class="pay-opt"><input type="radio" name="pay"> Cash on Delivery (COD)</label>
      </div>
    </div>
  </div>
  <div class="order-card">
    <h3>Order Summary</h3>
    <div id="checkoutItems"></div>
    <div class="order-total"><span>Total</span><span id="checkoutTotal" style="color:var(--orange);">Rs. 0</span></div>
    <div style="font-size:12px;color:var(--green);margin:10px 0;">🎉 Free delivery included!</div>
    <button class="btn-orange btn-full" style="margin-top:8px;" onclick="placeOrder()">Place Order →</button>
    <div style="font-size:11px;color:var(--lgray);text-align:center;margin-top:12px;">🔒 Your information is encrypted and secure</div>
  </div>
</div>

<script src="main.js?v=8"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const cart = JSON.parse(localStorage.getItem('aiaCart') || '[]');
  const items = document.getElementById('checkoutItems');
  const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  if (items) items.innerHTML = cart.map(i => `<div class="order-item"><span>${i.name} × ${i.qty}</span><span>Rs. ${(i.price*i.qty).toLocaleString('en-IN')}</span></div>`).join('') || '<div class="order-item"><span>No items</span></div>';
  const t = document.getElementById('checkoutTotal');
  if (t) t.textContent = 'Rs. ' + total.toLocaleString('en-IN');
});

function showCheckoutError(msg) {
  const el = document.getElementById('checkoutError');
  if (!el) { alert(msg); return; }
  el.textContent = msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function hideCheckoutError() {
  const el = document.getElementById('checkoutError');
  if (el) el.style.display = 'none';
}

function validateCheckout(fields) {
  const required = ['firstName', 'lastName', 'email', 'phone', 'address', 'city', 'pincode', 'state'];
  for (const key of required) {
    if (!fields[key]) return 'Please fill in all required shipping fields.';
  }
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(fields.email);
  if (!emailOk) return 'Please enter a valid email address.';
  const phoneOk = /^[0-9+\-\s()]{7,20}$/.test(fields.phone);
  if (!phoneOk) return 'Please enter a valid phone number.';
  return null;
}

async function placeOrder() {
  hideCheckoutError();
  const cart = JSON.parse(localStorage.getItem('aiaCart') || '[]');
  if (!cart.length) {
    showCheckoutError('Your cart is empty.');
    return;
  }

  const fields = {
    firstName: document.getElementById('ckFirstName').value.trim(),
    lastName: document.getElementById('ckLastName').value.trim(),
    email: document.getElementById('ckEmail').value.trim(),
    phone: document.getElementById('ckPhone').value.trim(),
    address: document.getElementById('ckAddr1').value.trim(),
    address2: document.getElementById('ckAddr2').value.trim(),
    city: document.getElementById('ckCity').value.trim(),
    pincode: document.getElementById('ckPincode').value.trim(),
    state: document.getElementById('ckState').value.trim(),
  };

  const validationError = validateCheckout(fields);
  if (validationError) {
    showCheckoutError(validationError);
    return;
  }

  const payload = {
    action: 'order',
    name: `${fields.firstName} ${fields.lastName}`,
    email: fields.email,
    phone: fields.phone,
    address: fields.address2 ? `${fields.address}, ${fields.address2}` : fields.address,
    city: fields.city,
    state: fields.state,
    pincode: fields.pincode,
    paymentMethod: document.querySelector('input[name="pay"]:checked')?.parentElement?.textContent?.trim() || 'COD',
    items: cart,
    total: cart.reduce((s,i) => s + i.price*i.qty, 0)
  };

  try {
    const res = await fetch('api.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      localStorage.removeItem('aiaCart');
      alert(`Order placed successfully! Your order ID is #${data.orderId}.`);
      window.location.href = 'index.html?order=success';
    } else {
      showCheckoutError(data.message || 'Order could not be placed.');
    }
  } catch (err) {
    showCheckoutError('Could not connect to the backend.');
  }
}
</script>
</body>
</html>
