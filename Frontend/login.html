<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALL IN ONE ABROAD</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=1"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=1"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=1"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=1"/>
  <link rel="stylesheet" href="style.css?v=17"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--light); padding: 24px; }
    .auth-card { background: #fff; border-radius: 20px; padding: 44px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-top { font-size: 10px; font-weight: 800; letter-spacing: 0.18em; color: var(--gray); display: block; }
    .auth-logo .logo-bottom { font-size: 26px; font-weight: 900; color: var(--orange); display: block; }
    .auth-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .auth-sub { font-size: 13px; color: var(--gray); text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--dark); display: block; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--orange); }
    .auth-forgot { text-align: right; font-size: 12px; color: var(--orange); margin-top: -8px; margin-bottom: 20px; }
    .auth-divider { text-align: center; font-size: 12px; color: var(--lgray); margin: 18px 0; position: relative; }
    .auth-divider::before, .auth-divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--border); }
    .auth-divider::before { left:0; } .auth-divider::after { right:0; }
    .auth-switch { text-align: center; font-size: 13px; color: var(--gray); margin-top: 20px; }
    .auth-switch a { color: var(--orange); font-weight: 600; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-top">ALL IN ONE</span><span class="logo-bottom">ABROAD</span></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to track orders &amp; manage your account</p>
    <form onsubmit="handleLogin(event)">
      <div class="form-group"><label>Email address</label><input type="email" placeholder="you@email.com" required id="loginEmail"/></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••" required id="loginPass"/></div>
      <div class="auth-forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-orange btn-full">Sign In</button>
    </form>
    <div class="auth-divider">or</div>
    <div class="auth-switch">Don't have an account? <a href="register.html">Create one free</a></div>
    <div style="margin-top:20px;text-align:center;"><a href="index.html" style="font-size:13px;color:var(--gray);">← Back to store</a></div>
  </div>
</div>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const payload = {
    action: 'login',
    email: document.getElementById('loginEmail').value.trim(),
    password: document.getElementById('loginPass').value
  };

  try {
    const res = await fetch('api.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.success) {
      alert(`Welcome back, ${data.user.name}!`);
      window.location.href = 'index.html';
    } else {
      alert(data.message || 'Login failed.');
    }
  } catch (err) {
    alert('Could not connect to the backend.');
  }
}
</script>
</body>
</html>
